<div class="photos-wrapper section-wrapper">
  <div class="header">
    <h1 class="title script-font">Gallery</h1>
    <div class="divider">
      <span class="line"></span>
      <span class="diamond"></span>
      <span class="line"></span>
    </div>
  </div>

  <div class="gallery">
    <div class="photo-frame interactive-card" style="--delay: 0.2s">
      <img src="couple1.jpeg" alt="Gopal & Vaishali">
      <div class="caption">Gopal & Vaishali</div>
    </div>

    <!-- This photo will reveal on scroll -->
    <div class="photo-frame interactive-card reveal" style="--delay: 0s">
      <img src="couple2.jpeg" alt="25 Years Together">
      <div class="caption">25 Years of Togetherness</div>
    </div>
  </div>
</div>
